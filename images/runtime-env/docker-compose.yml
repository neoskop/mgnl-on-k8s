version: "3.4"
services:
  sut:
    build:
      dockerfile: ../Dockerfile
      context: build
    environment:
      LOG_LEVEL: DEBUG
      MAGNOLIA_CONFIG: foo
      DATASOURCES: |
        {
          "datasources": [
            {
              "name": "MagnoliaAuthor",
              "database": "author",
              "host": "db",
              "password": "<&%!^>",
              "username": "author"
            }
          ]
        }
  db:
    image: mysql:9.6.0@sha256:c5df04bee1a42b74a5841c6409e669cf62126cd0416f00c1cea8ab933b9361b9
    environment:
      MYSQL_DATABASE: author
      MYSQL_USER: author
      MYSQL_PASSWORD: <&%!^>
      MYSQL_RANDOM_ROOT_PASSWORD: "true"
