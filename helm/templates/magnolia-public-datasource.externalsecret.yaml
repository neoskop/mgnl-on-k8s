{{- if .Values.magnoliaPublic.datasource.externalSecret.enabled }}
{{- $name := printf "%s-datasource-password" (include "mgnl.public.name" .) }}
{{- $es := .Values.magnoliaPublic.datasource.externalSecret }}
{{ include "mgnl.externalSecret.head" (dict "name" $name "es" $es "root" .) }}
  data:
    - secretKey: MGNL_PUBLIC_DB_PASSWORD
      remoteRef:
        key: {{ required "magnoliaPublic.datasource.externalSecret.remoteKey is required" $es.remoteKey }}
        property: {{ $es.properties.password | default "MGNL_PUBLIC_DB_PASSWORD" }}
{{- end }}
