{{- if and .Values.magnoliaAuthor.ingress.enabled .Values.magnoliaAuthor.previewRedirect.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "mgnl.author.previewRedirect.name" . }}
  labels:
    {{- include "mgnl.labels" . | nindent 4 }}
    app.kubernetes.io/component: magnolia-author-preview-redirect
spec:
  type: ClusterIP
  ports:
    - name: http
      protocol: TCP
      port: 8080
      targetPort: http
  selector:
    app.kubernetes.io/name: magnolia-author-preview-redirect
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
