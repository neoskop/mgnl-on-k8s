apiVersion: v1
kind: Secret
metadata:
  name: {{ include "mgnl.author.name" . }}-datasource
  labels:
{{ include "mgnl.labels" . | indent 4 }}
data:
  {{- if .Values.magnoliaAuthor.datasource.externalSecret.enabled }}
  datasource: {{ tpl (.Files.Get "datasource-author-external.json") . | b64enc }}
  {{- else }}
  datasource: {{ tpl (.Files.Get "datasource-author.json") . | b64enc }}
  {{- end }}
