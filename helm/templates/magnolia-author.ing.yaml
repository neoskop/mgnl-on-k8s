{{- if .Values.magnoliaAuthor.ingress.enabled -}}
{{- if semverCompare ">=1.19-0" .Capabilities.KubeVersion.GitVersion -}}
apiVersion: networking.k8s.io/v1
{{- else if semverCompare ">=1.14-0" .Capabilities.KubeVersion.GitVersion -}}
apiVersion: networking.k8s.io/v1beta1
{{- else -}}
apiVersion: extensions/v1beta1
{{- end }}
kind: Ingress
metadata:
  name: {{ include "mgnl.author.name" . }}
  labels:
    {{- $mergedLabels := include "mgnl.author.ingress.labels" . | fromYaml }}
    {{- if $mergedLabels }}
      {{- toYaml $mergedLabels | nindent 4 }}
    {{- end }}
    {{- include "mgnl.labels" . | nindent 4 }}
  {{- $controller := include "mgnl.ingress.controller" . }}
  {{- $userAnnotations := include "mgnl.author.ingress.annotations" . | fromYaml }}
  {{- $builtin := dict }}
  {{- if eq $controller "traefik" }}
  {{- $builtin = dict "traefik.ingress.kubernetes.io/router.entrypoints" "web,websecure" }}
  {{- end }}
  {{- $mergedAnnotations := merge $userAnnotations $builtin }}
  {{- if or $mergedAnnotations (and .Values.ipWhitelist (eq $controller "nginx")) }}
  annotations:
    {{- with $mergedAnnotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- if and .Values.ipWhitelist (eq $controller "nginx") }}
    nginx.ingress.kubernetes.io/whitelist-source-range: "{{ join "," .Values.ipWhitelist }}"
    {{- end }}
  {{- end }}
spec:
  {{- $className := include "mgnl.ingressClassName" (dict "instance" .Values.magnoliaAuthor.ingress.className "ctx" $) }}
  {{- if $className }}
  ingressClassName: {{ $className }}
  {{- end }}
  tls:
    - hosts:
        - {{ .Values.magnoliaAuthor.ingress.hostname }}
      secretName: {{ include "mgnl.author.name" . }}-tls
  rules:
    - host: {{ .Values.magnoliaAuthor.ingress.hostname }}
      http:
        paths:
          - path: /
            {{- if semverCompare ">=1.18-0" $.Capabilities.KubeVersion.GitVersion }}
            pathType: ImplementationSpecific
            {{- end }}
            backend:
              {{- if semverCompare ">=1.19-0" $.Capabilities.KubeVersion.GitVersion }}
              service:
                name: {{ include "mgnl.author.name" . }}
                port:
                  name: http
              {{- else }}
              serviceName: {{ include "mgnl.author.name" . }}
              servicePort: http
              {{- end }}
{{- end }}