{{- $pr := .Values.magnoliaAuthor.previewRedirect }}
{{- $code := ternary "301" "302" $pr.permanent }}
worker_processes auto;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  access_log    /dev/stdout;
  sendfile      on;

  map $arg_mgnlPreview $do_redirect {
    "false" 0;
    default 1;
  }

  server {
    listen 8080;
    server_name _;

    location = /healthz {
      default_type text/plain;
      return 200 "ok\n";
    }

{{- range $pr.routes }}
    location ~* ^/{{ .pathPrefix }}(?:/(.+))?\.html$ {
      if ($do_redirect) {
        return {{ $code }} https://{{ .target }}/$1$is_args$args;
      }

      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      proxy_pass http://{{ include "mgnl.author.name" $ }}:8080;
    }
{{- end }}
  }
}
