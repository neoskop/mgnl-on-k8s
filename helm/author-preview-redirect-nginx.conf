{{- $pr := .Values.magnoliaAuthor.previewRedirect }}
{{- $code := ternary "301" "302" $pr.permanent }}
worker_processes auto;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  access_log    /dev/stdout;
  sendfile      on;

  server {
    listen 8080;
    server_name _;

    location = /healthz {
      default_type text/plain;
      return 200 "ok\n";
    }

    location ~* ^/(?:/(.+))?\.html$ {
      return {{ $code }} https://{{ $pr.targetHostname }}/$1$is_args$args;
    }

    location / {
      return 404;
    }
  }
}
