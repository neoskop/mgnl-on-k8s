{{- $pr := .Values.magnoliaAuthor.previewRedirect }}
{{- $baseRx := $pr.baseDomain | replace "." "\\." }}
{{- $authRx := $pr.authorPrefix | replace "." "\\." }}
{{- $code := ternary "301" "302" $pr.permanent }}
worker_processes auto;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  access_log    /dev/stdout;
  sendfile      on;

  map $http_host $pr_instance {
    default "";
    ~^{{ $authRx }}\.(.+)\.{{ $baseRx }}$  $1;
  }

  server {
    listen 8080;
    server_name _;

    location = /healthz {
      default_type text/plain;
      return 200 "ok\n";
    }
{{- range $pr.routes }}
    location ~* ^/{{ .pathPrefix }}(?:/(.+))?\.html$ {
      if ($pr_instance = "") {
        return 404;
      }
      return {{ $code }} https://{{ .targetSubdomain }}.$pr_instance.{{ $pr.baseDomain }}/$1$is_args$args;
    }
{{- end }}
    location / {
      return 404;
    }
  }
}
