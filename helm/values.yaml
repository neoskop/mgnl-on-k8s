# Global External Secrets Operator settings shared by every ExternalSecret this chart renders.
# Per-secret blocks only toggle `enabled`, the `remoteKey`, and field mappings.
externalSecrets:
  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore
magnoliaLightModuleUpdater:
  privateKey: "" # Pass this base64 encoded
  # External Secrets Operator integration for the light module updater private key.
  # Pulls field "private-key" (base64 encoded) from the configured secret backend.
  externalSecret:
    enabled: false
    refreshInterval: 1h
    remoteKey: "" # Key/path of the item in the secret backend
    properties:
      privateKey: "" # Backend field name; defaults to "private-key"
  repoUrl: ""
  tag: false # change this to true to checkout a tag from the coresponding config map or to a specific version to hardcode that
  branch: "master"
  sourceDir: "/"
  image:
    repository: neoskop/mgnl-light-module-updater
    tag: 3.0.0
    pullPolicy: Always
    pullSecret: {}
    existingPullSecret: "" # Name of existing pull secret in namespace
  resources:
    requests:
      memory: 128M
      cpu: 0.1
    limits:
      memory: 512M
  storage:
    resources:
      requests:
        storage: 1Gi
jackrabbit:
  fileDatastore:
    enabled: false
    resources:
      requests:
        storage: 64Gi
license:
  enabled: false
  key: ""
  email: ""
  # External Secrets Operator integration for the Magnolia license.
  externalSecret:
    enabled: false
    refreshInterval: 1h
    remoteKey: "" # Key/path of the item in the secret backend
    properties:
      licenseKey: "" # Backend field name; defaults to "license.key"
      email: "" # Backend field name; defaults to "email"
magnoliaRuntime:
  image:
    repository: neoskop/mgnl-runtime-env
    tag: 3.0.0
    pullPolicy: IfNotPresent
    pullSecret: {}
    existingPullSecret: "" # Name of existing pull secret in namespace
  resources:
    requests:
      memory: 2560M
      cpu: 250m
    limits:
      memory: 4096M
magnoliaWebapp:
  image:
    repository: neoskop/mgnl-webapp-ce
    tag: 6.4.3
    pullPolicy: IfNotPresent
    pullSecret: {}
    existingPullSecret: "" # Name of existing pull secret in namespace
  resources:
    requests:
      memory: 100Mi
    limits:
      memory: 256Mi
tmpInit:
  image:
    repository: busybox
    tag: 1.37.0
    pullPolicy: IfNotPresent
    pullSecret: {}
    existingPullSecret: "" # Name of existing pull secret in namespace
  resources:
    requests:
      memory: 20Mi
      cpu: 10m
    limits:
      memory: 20Mi
datastoreInit:
  image:
    repository: busybox
    tag: 1.37.0
    pullPolicy: IfNotPresent
    pullSecret: {}
  resources:
    requests:
      memory: 20Mi
      cpu: 10m
    limits:
      memory: 20Mi
mysqlInit:
  image:
    repository: busybox
    tag: 1.37.0
    pullPolicy: IfNotPresent
    pullSecret: {}
  resources:
    requests:
      memory: 20Mi
      cpu: "0.01"
    limits:
      memory: 20Mi
mysql:
  enabled: true
  rootPassword: ""
  # External Secrets Operator integration for the MySQL root password.
  externalSecret:
    enabled: false
    refreshInterval: 1h
    remoteKey: "" # Key/path of the item in the secret backend
    properties:
      root: "" # Backend field name; defaults to "root"
  image:
    repository: mysql
    tag: 9.6.0
    pullPolicy: IfNotPresent
    pullSecret: {}
  resources:
    requests:
      memory: 200Mi
    limits:
      memory: 500Mi
  storage:
    resources:
      requests:
        storage: 3Gi
  nodeSelector: {}
  tolerations: []
  affinity: {}
magnoliaTmp:
  storage:
    resources:
      requests:
        storage: 1Gi
# Shared Magnolia configuration - values here apply to both author and public instances
# Instance-specific values in magnoliaAuthor/magnoliaPublic override these
magnolia:
  # Shared custom environment variables (merged with instance-specific)
  customEnv: {}
  # External Secrets Operator integration for secrets injected as environment variables.
  # Each entry's secretKey becomes the env var name; property is the backend field
  # (defaults to secretKey). The resulting Secret is consumed via envFrom.
  externalSecret:
    enabled: false
    refreshInterval: 1h
    remoteKey: "" # Key/path of the item in the secret backend
    data: []
    # - secretKey: MY_SECRET   # env var name
    #   property: my-secret    # backend field name (defaults to secretKey)
  # Shared microprofile configuration (merged with instance-specific)
  microprofileConfig: {}
  # Shared datasource defaults
  datasource:
    host: "" # If empty the created MySQL service is used
    port: 3306
  # Shared ingress defaults (merged with instance-specific)
  ingress:
    annotations: {}
    labels: {}
  # Shared asset ingress defaults (merged with instance-specific)
  assetIngress:
    annotations: {}
  # Shared node scheduling (used if instance-specific is empty)
  nodeSelector: {}
  tolerations: []
  affinity: {}
magnoliaActivation:
  privateKey: ""
  publicKey: ""
  # External Secrets Operator integration for the activation keypair.
  # Pulls the keypair properties file from the configured secret backend.
  externalSecret:
    enabled: false
    refreshInterval: 1h
    remoteKey: "" # Key/path of the item in the secret backend
    properties:
      properties: "" # Backend field name; defaults to "magnolia-activation-keypair.properties"
magnoliaPublic:
  replicaCount: 1
  configName: livePublic
  microprofileConfig: {}
  customEnv: {}
  datasource:
    host: "" # If empty the created service is used
    port: 3306
    username: "" # If empty the value is derived automatically
    password: ""
    database: "" # If empty the value is derived automatically
    name: MagnoliaPublic
    # External Secrets Operator integration for the datasource password.
    externalSecret:
      enabled: false
      refreshInterval: 1h
      remoteKey: "" # Key/path of the item in the secret backend
      properties:
        password: "" # Backend field name; defaults to the DB password env var name
  assetIngress:
    enabled: false
    hostname: magnolia-public-assets.local
    secret:
      enabled: false
      ca: ""
      cert: ""
      key: ""
    annotations:
      nginx.ingress.kubernetes.io/rewrite-target: /dam/$1
      nginx.ingress.kubernetes.io/configuration-snippet: |
        more_set_headers "X-Robots-Tag: noindex";
  ingress:
    enabled: true
    hostname: magnolia-public.local
    secret:
      enabled: false
      ca: ""
      cert: ""
      key: ""
    annotations: {}
    labels: {}
  nodeSelector: {}
  tolerations: []
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - magnolia-public
          topologyKey: "kubernetes.io/hostname"
magnoliaAuthor:
  replicaCount: 1
  configName: liveAuthor
  microprofileConfig: {}
  customEnv: {}
  datasource:
    host: "" # If empty the created service is used
    port: 3306
    username: "" # If empty the value is derived automatically
    password: ""
    database: "" # If empty the value is derived automatically
    name: MagnoliaAuthor
    # External Secrets Operator integration for the datasource password.
    externalSecret:
      enabled: false
      refreshInterval: 1h
      remoteKey: "" # Key/path of the item in the secret backend
      properties:
        password: "" # Backend field name; defaults to the DB password env var name
  assetIngress:
    enabled: false
    hostname: magnolia-author-assets.local
    secret:
      enabled: false
      ca: ""
      cert: ""
      key: ""
    annotations:
      nginx.ingress.kubernetes.io/rewrite-target: /dam/$1
      nginx.ingress.kubernetes.io/configuration-snippet: |
        more_set_headers "X-Robots-Tag: noindex";
  ingress:
    enabled: true
    hostname: magnolia-author.local
    secret:
      enabled: false
      ca: ""
      cert: ""
      key: ""
    annotations: {}
    labels: {}
  previewRedirect:
    enabled: false
    authorPrefix: author
    permanent: false
    routes:
      - pathPrefix: ""
        target: ""
    image:
      repository: nginx
      tag: 1.31-alpine@sha256:8b1e78743a03dbb2c95171cc58639fef29abc8816598e27fb910ed2e621e589a
    resources:
      requests:
        memory: 16Mi
        cpu: 10m
      limits:
        memory: 32Mi
    ingress:
      annotations: {}
  nodeSelector: {}
  tolerations: []
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - magnolia-author
          topologyKey: "kubernetes.io/hostname"
nameOverride: ""
fullnameOverride: ""
resources: {}
nodeSelector: {}
tolerations: []
affinity: {}
ipWhitelist: []
