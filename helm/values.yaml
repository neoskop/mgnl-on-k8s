# Global External Secrets Operator settings shared by every ExternalSecret this chart renders.
# Per-secret blocks only toggle `enabled`, the `remoteKey`, and field mappings.
externalSecrets:
  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore
magnoliaLightModuleUpdater:
  privateKey: "" # Pass this base64 encoded
  # External Secrets Operator integration for the light module updater private key.
  # Pulls field "private-key" (base64 encoded) from the configured secret backend.
  externalSecret:
    enabled: false
    refreshInterval: 1h
    remoteKey: "" # Key/path of the item in the secret backend
    properties:
      privateKey: "" # Backend field name; defaults to "private-key"
  repoUrl: ""
  tag: false # change this to true to checkout a tag from the coresponding config map or to a specific version to hardcode that
  branch: "master"
  sourceDir: "/"
  image:
    repository: neoskop/mgnl-light-module-updater
    tag: 4.0.0
    pullPolicy: Always
    pullSecret: {}
    existingPullSecret: "" # Name of existing pull secret in namespace
  resources:
    requests:
      memory: 128M
      cpu: 0.1
    limits:
      memory: 512M
  storage:
    resources:
      requests:
        storage: 1Gi
jackrabbit:
  fileDatastore:
    enabled: false
    resources:
      requests:
        storage: 64Gi
license:
  enabled: false
  key: ""
  email: ""
  # External Secrets Operator integration for the Magnolia license.
  externalSecret:
    enabled: false
    refreshInterval: 1h
    remoteKey: "" # Key/path of the item in the secret backend
    properties:
      licenseKey: "" # Backend field name; defaults to "license.key"
      email: "" # Backend field name; defaults to "email"
magnoliaRuntime:
  image:
    repository: neoskop/mgnl-runtime-env
    tag: 4.0.0
    pullPolicy: IfNotPresent
    pullSecret: {}
    existingPullSecret: "" # Name of existing pull secret in namespace
  resources:
    requests:
      memory: 2560M
      cpu: 250m
    limits:
      memory: 4096M
magnoliaWebapp:
  image:
    repository: neoskop/mgnl-webapp-ce
    tag: 6.4.7@sha256:b6e231c44128d9c32667d09c7854a7c489b610d871c6d7f29015b91b47644a65
    pullPolicy: IfNotPresent
    pullSecret: {}
    existingPullSecret: "" # Name of existing pull secret in namespace
  resources:
    requests:
      memory: 100Mi
    limits:
      memory: 256Mi
tmpInit:
  image:
    repository: busybox
    tag: 1.38.0@sha256:fd8d9aa63ba2f0982b5304e1ee8d3b90a210bc1ffb5314d980eb6962f1a9715d
    pullPolicy: IfNotPresent
    pullSecret: {}
    existingPullSecret: "" # Name of existing pull secret in namespace
  resources:
    requests:
      memory: 20Mi
      cpu: 10m
    limits:
      memory: 20Mi
datastoreInit:
  image:
    repository: busybox
    tag: 1.38.0@sha256:fd8d9aa63ba2f0982b5304e1ee8d3b90a210bc1ffb5314d980eb6962f1a9715d
    pullPolicy: IfNotPresent
    pullSecret: {}
  resources:
    requests:
      memory: 20Mi
