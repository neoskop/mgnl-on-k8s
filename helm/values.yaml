mysql:
  enabled: true
  rootPassword: ""
  # External Secrets Operator integration for the MySQL root password.
  externalSecret:
    enabled: false
    refreshInterval: 1h
    remoteKey: "" # Key/path of the item in the secret backend
    properties:
      root: "" # Backend field name; defaults to "root"
  image:
    repository: mysql
    tag: 9.7.1@sha256:ad88e1c86cbf12ef52d0a0360cd4b774d22956c5ee9c565645fb019d7aacb6c3
    pullPolicy: IfNotPresent
    pullSecret: {}
  resources:
    requests:
      memory: 200Mi
    limits:
      memory: 500Mi
  storage:
    resources:
      requests:
        storage: 3Gi
  nodeSelector: {}
  tolerations: []
  affinity: {}
magnoliaTmp:
  storage:
    resources:
      requests:
        storage: 1Gi
# Shared Magnolia configuration - values here apply to both author and public instances
# Instance-specific values in magnoliaAuthor/magnoliaPublic override these
magnolia:
  # Shared custom environment variables (merged with instance-specific)
  customEnv: {}
  # External Secrets Operator integration for secrets injected as environment variables.
  # Each entry's secretKey becomes the env var name; property is the backend field
  # (defaults to secretKey). The resulting Secret is consumed via envFrom.
  externalSecret:
    enabled: false
    refreshInterval: 1h
    remoteKey: "" # Key/path of the item in the secret backend
    data: []
    # - secretKey: MY_SECRET   # env var name
    #   property: my-secret    # backend field name (defaults to secretKey)
  # Shared microprofile configuration (merged with instance-specific)
  microprofileConfig: {}
  # Shared datasource defaults
  datasource:
    host: "" # If empty the created MySQL service is used
    port: 3306
  # Shared ingress defaults (merged with instance-specific)
  ingress:
    # Ingress controller type: nginx | traefik.
    # Drives path syntax and which built-in controller annotations are emitted.
    controller: nginx
    # ingressClassName applied to every Ingress (empty = omit, use cluster default class).
    # Can be overridden per-ingress via the instance-level `className`.
    className: ""
    annotations: {}
    labels: {}
  # Shared asset ingress defaults (merged with instance-specific)
  assetIngress:
    annotations: {}
  # Shared node scheduling (used if instance-specific is empty)
  nodeSelector: {}
  tolerations: []
  affinity: {}
magnoliaActivation:
  privateKey: ""
  publicKey: ""
  # External Secrets Operator integration for the activation keypair.
  # Pulls the keypair properties file from the configured secret backend.
  externalSecret:
    enabled: false
    refreshInterval: 1h
    remoteKey: "" # Key/path of the item in the secret backend
    properties:
      properties: "" # Backend field name; defaults to "magnolia-activation-keypair.properties"
magnoliaPublic:
  replicaCount: 1
  configName: livePublic
  microprofileConfig: {}
  customEnv: {}
  datasource:
    host: "" # If empty the created service is used
    port: 3306
    username: "" # If empty the value is derived automatically
    password: ""
    database: "" # If empty the value is derived automatically
    name: MagnoliaPublic
    # External Secrets Operator integration for the datasource password.
    externalSecret:
      enabled: false
      refreshInterval: 1h
      remoteKey: "" # Key/path of the item in the secret backend
      properties:
        password: "" # Backend field name; defaults to the DB password env var name
  assetIngress:
    enabled: false
    hostname: magnolia-public-assets.local
    # Override the shared ingressClassName for this ingress (empty = use shared).
    className: ""
    secret:
      enabled: false
      ca: ""
      cert: ""
      key: ""
    # Extra annotations. The /dam rewrite and X-Robots-Tag header are emitted
    # automatically for controller=nginx. For controller=traefik, supply a
    # Middleware (addPrefix /dam + customResponseHeaders) via:
    #   traefik.ingress.kubernetes.io/router.middlewares: <ns>-<mw>@kubernetescrd
    annotations: {}
  ingress:
    enabled: true
    hostname: magnolia-public.local
    # Override the shared ingressClassName for this ingress (empty = use shared).
    className: ""
    secret:
      enabled: false
      ca: ""
      cert: ""
      key: ""
    annotations: {}
    labels: {}
  nodeSelector: {}
  tolerations: []
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - magnolia-public
          topologyKey: "kubernetes.io/hostname"
magnoliaAuthor:
  replicaCount: 1
  configName: liveAuthor
  microprofileConfig: {}
  customEnv: {}
  datasource:
    host: "" # If empty the created service is used
    port: 3306
    username: "" # If empty the value is derived automatically
    password: ""
    database: "" # If empty the value is derived automatically
    name: MagnoliaAuthor
    # External Secrets Operator integration for the datasource password.
    externalSecret:
      enabled: false
      refreshInterval: 1h
      remoteKey: "" # Key/path of the item in the secret backend
      properties:
        password: "" # Backend field name; defaults to the DB password env var name
  assetIngress:
    enabled: false
    hostname: magnolia-author-assets.local
    # Override the shared ingressClassName for this ingress (empty = use shared).
    className: ""
    secret:
      enabled: false
      ca: ""
      cert: ""
      key: ""
    # Extra annotations. The /dam rewrite and X-Robots-Tag header are emitted
    # automatically for controller=nginx. For controller=traefik, supply a
    # Middleware (addPrefix /dam + customResponseHeaders) via:
    #   traefik.ingress.kubernetes.io/router.middlewares: <ns>-<mw>@kubernetescrd
    annotations: {}
  ingress:
    enabled: true
    hostname: magnolia-author.local
    # Override the shared ingressClassName for this ingress (empty = use shared).
    className: ""
    secret:
      enabled: false
      ca: ""
      cert: ""
      key: ""
    annotations: {}
    labels: {}
  previewRedirect:
    enabled: false
    authorPrefix: author
    permanent: false
    routes:
      # path/pathType are optional per-route overrides for the ingress match.
      # nginx: omit to use the regex match /<pathPrefix>(?:/.+)?\.html.
      # traefik: cannot do regex paths in a plain Ingress — set an explicit
      # path (e.g. /author) and pathType (Prefix); the sidecar's own nginx
      # config still performs the real .html match and redirect.
      - pathPrefix: ""
        target: ""
        path: ""
        pathType: ""
    image:
      repository: nginx
      tag: 1.31-alpine@sha256:54f2a904c251d5a34adf545a72d32515a15e08418dae0266e23be2e18c66fefa
    resources:
      requests:
        memory: 16Mi
        cpu: 10m
      limits:
        memory: 32Mi
    ingress:
      # Override the shared ingressClassName for this ingress (empty = use shared).
      className: ""
      annotations: {}
  nodeSelector: {}
  tolerations: []
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - magnolia-author
          topologyKey: "kubernetes.io/hostname"
nameOverride: ""
fullnameOverride: ""
resources: {}
nodeSelector: {}
tolerations: []
affinity: {}
ipWhitelist: []
